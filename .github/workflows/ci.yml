name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
        continue-on-error: true
      - run: npm test
      - run: npm run build
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}

  # Phase 3a · visual regression (closes F-06). Requires the PLAYWRIGHT_TEST_TOKEN
  # secret to exist in repo settings. Skips gracefully when the secret is empty.
  visual-regression:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ vars.PLAYWRIGHT_VISUAL_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      - run: npm run test:visual
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          DASHBOARD_ACCESS_TOKEN: ${{ secrets.PLAYWRIGHT_TEST_TOKEN }}
          PLAYWRIGHT_TEST_TOKEN: ${{ secrets.PLAYWRIGHT_TEST_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
